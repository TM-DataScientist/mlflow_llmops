# AI Gateway設定（7.4節）- Gateway Server (Legacy)方式
#
# ■ 推奨: 新AI Gateway（Tracking Server統合型）
#   MLflow 3.10以降、AI GatewayはTracking Serverに統合されました。
#   エンドポイントの作成・管理はMLflow UI (http://localhost:5000/#/gateway) から
#   行えます。本書の7.4節ではこの新方式を解説しています。
#
# ■ 本ファイルについて
#   このYAML設定ファイルは、旧方式（Gateway Server Legacy）で
#   AI Gatewayを起動する場合に使用します。
#   UIを使わずにコマンドラインからエンドポイントを再現したい場合や、
#   設定をバージョン管理したい場合に便利です。
#
# 起動方法（Legacy方式）:
#   mlflow gateway start --config-path gateway/gateway_config.yaml --port 5010
#
# 参考:
#   新AI Gateway: https://mlflow.org/docs/latest/genai/governance/ai-gateway/
#   Legacy方式: https://mlflow.org/docs/latest/genai/governance/ai-gateway/legacy/

endpoints:
  # QAエージェントのLLMバックエンド
  - name: qa-agent-llm
    endpoint_type: llm/v1/chat
    model:
      provider: openai
      name: gpt-4o-mini
      config:
        openai_api_key: $OPENAI_API_KEY
    limit:
      renewal_period: minute
      calls: 100

  # Embedding用エンドポイント（Milvusへの格納・検索時に使用）
  - name: qa-agent-embedding
    endpoint_type: llm/v1/embeddings
    model:
      provider: openai
      name: text-embedding-3-small
      config:
        openai_api_key: $OPENAI_API_KEY

  # フォールバック用のバックアップLLM（利用する場合はコメントを解除してください）
  # - name: qa-agent-llm-backup
